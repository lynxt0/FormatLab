name: Release

# Triggered by pushing a git tag like `v0.1.0`, `v0.1.1`, etc.
# Produces:
#   - a GitHub Release (draft)
#   - platform installers (.AppImage, .deb, .exe) attached as assets
#   - `latest.json` — the manifest the auto-updater reads
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-latest
            # HEIC/HEIF/AVIF decoding links against libheif, which we
            # haven't wired up for Windows yet (vcpkg integration is
            # planned for v0.1.2). Disable the default `heic` feature
            # so the Windows .exe still builds.
            args: "--no-default-features"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            libheif-dev \
            libheif-plugin-libde265 \
            libheif-plugin-aomdec \
            ffmpeg

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FormatLab ${{ github.ref_name }}"
          releaseBody: |
            ## FormatLab ${{ github.ref_name }}

            Download the right installer for your OS:

            - **Windows:** `FormatLab_*_x64-setup.exe`
            - **Linux (AppImage, any distro):** `FormatLab_*_amd64.AppImage`
            - **Linux (Debian / Ubuntu / Mint):** `FormatLab_*_amd64.deb`

            All conversions happen on your device. FormatLab does not
            contact any server other than GitHub Releases for updates.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
