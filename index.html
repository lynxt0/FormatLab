<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>FormatLab</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">FormatLab</span>
        </div>
        <div class="topbar-actions">
          <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
          </button>
        </div>
      </header>

      <main>
        <div id="update-banner" class="update-banner hidden"></div>

        <section id="dropzone" class="dropzone" tabindex="0">
          <div class="dropzone-inner">
            <svg class="dropzone-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <h1 class="dropzone-title">Drop files to convert</h1>
            <p class="dropzone-subtitle">or <button type="button" id="browse-btn" class="linklike">browse your computer</button></p>
            <p class="dropzone-hint">Everything is converted on-device. Nothing is uploaded.</p>
          </div>
        </section>

        <section id="queue-section" class="queue-section hidden">
          <div class="queue-header">
            <div class="queue-header-left">
              <h2>Files</h2>
              <span id="queue-count" class="queue-count">0</span>
            </div>
            <div class="queue-header-right">
              <label class="field">
                <span class="field-label">Convert to</span>
                <select id="format-select" class="select"></select>
              </label>
              <button id="clear-btn" class="btn btn-ghost">Clear</button>
              <button id="convert-btn" class="btn btn-primary" disabled>Convert</button>
            </div>
          </div>

          <ul id="file-list" class="file-list"></ul>
        </section>
      </main>

      <footer class="statusbar">
        <span id="status-text">Ready</span>
        <span class="statusbar-spacer"></span>
        <span class="statusbar-version">v0.1.0 · local only</span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
